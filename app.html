<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GourmetList - App</title>
  <script src="https://cdn.jsdelivr.net/npm/tailwindcss-cdn@3.4.10/tailwindcss.js"></script>
  <link rel="stylesheet" href="styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style type="text/tailwindcss" data-teda="tailwind-apply">
    @layer components {
      .btn-icon { @apply p-2 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors focus:outline-none focus:ring-2 focus:ring-orange-200; }
    }
  </style>
</head>
<body class="bg-[#f4f7f5] h-screen overflow-hidden flex flex-col">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 h-16 flex-shrink-0 z-20">
    <div class="h-full px-4 md:px-6 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 group">
        <div class="text-orange-500 w-6 h-6 group-hover:scale-110 transition-transform">
             <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        </div>
        <span class="font-bold text-gray-900 group-hover:text-orange-600 transition-colors">GourmetList</span>
      </a>
      <div class="flex items-center gap-2">
        <button id="chat-toggle-btn" class="lg:hidden btn-icon relative">
           <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
           <!-- Badge -->
           <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-orange-500 rounded-full"></span>
        </button>
        <button id="share-header-btn" class="btn-icon" title="Share list">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12v.01M12 4v.01M20 12v.01M12 20v.01M7.75 7.75l8.5 8.5M7.75 16.25l8.5-8.5"/></svg>
        </button>
        <button id="theme-toggle-btn" class="btn-icon" title="Switch to dark theme" aria-label="Switch to dark theme">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12.41A8 8 0 0111.59 4 7 7 0 1012 20a8 8 0 008-7.59z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow flex overflow-hidden relative">
    <!-- Shopping List Panel -->
    <section class="flex-grow flex flex-col w-full h-full overflow-hidden bg-[#f4f7f5]">
      <!-- Input Area -->
      <div class="p-6 max-w-3xl mx-auto w-full">
        <form id="add-form" class="relative">
          <input type="text" id="item-input" placeholder="Add item (e.g. 'Milk', 'Eggs')" class="w-full pl-5 pr-14 py-4 rounded-2xl border-none shadow-lg focus:ring-2 focus:ring-orange-500 outline-none text-lg text-gray-800 placeholder-gray-400">
          <button type="submit" class="absolute right-2 top-2 bottom-2 bg-orange-500 hover:bg-orange-600 text-white rounded-xl px-4 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          </button>
        </form>
      </div>

      <div class="px-6 pb-2 max-w-3xl mx-auto w-full flex items-center justify-between">
        <div class="flex gap-2">
          <button class="filter-btn bg-orange-500 text-white px-3 py-1 rounded-lg text-sm font-medium transition-colors" data-filter="all">All</button>
          <button class="filter-btn text-gray-600 hover:bg-gray-200 px-3 py-1 rounded-lg text-sm font-medium transition-colors" data-filter="active">To Buy</button>
          <button class="filter-btn text-gray-600 hover:bg-gray-200 px-3 py-1 rounded-lg text-sm font-medium transition-colors" data-filter="completed">Done</button>
          <button class="filter-btn text-gray-600 hover:bg-gray-200 px-3 py-1 rounded-lg text-sm font-medium transition-colors" data-filter="shared">Shared</button>
        </div>
        <div class="flex items-center gap-3 flex-wrap">
          <div class="flex flex-col gap-1">
            <button id="open-chef-btn" disabled class="text-xs font-semibold text-white bg-orange-400 px-3 py-1 rounded-lg transition-colors flex items-center gap-1 opacity-50 cursor-not-allowed">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c1.657 0 3-1.12 3-2.5S13.657 6 12 6s-3 1.12-3 2.5S10.343 11 12 11z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 20v-1a6 6 0 0112 0v1"/></svg>
              Chef Bot
            </button>
            <div class="flex items-center gap-2 text-xs text-gray-500">
              <div class="w-24 h-1 bg-gray-200 rounded-full overflow-hidden">
                <div id="ai-progress-bar" class="h-full bg-orange-500 transition-all duration-300" style="width: 0%"></div>
              </div>
              <span id="ai-status-text">Loading Chef Bot... 0%</span>
            </div>
          </div>
          <button id="smart-sort-btn" class="text-xs font-semibold text-orange-600 bg-orange-50 hover:bg-orange-100 px-3 py-1 rounded-lg transition-colors">Smart Sort</button>
          <span id="stats-text" class="text-xs font-bold text-gray-400 uppercase tracking-wider">0/0 done</span>
        </div>
      </div>
      <!-- Progress Bar -->
      <div class="w-full h-1 bg-gray-200">
        <div id="progress-bar" class="h-full bg-orange-500 transition-all duration-500" style="width: 0%"></div>
      </div>
      <!-- List Items -->
      <div id="shopping-list" class="flex-grow overflow-y-auto p-6 max-w-3xl mx-auto w-full space-y-2"></div>
      <div class="p-4 border-t border-gray-200 bg-[#f4f7f5] flex flex-wrap items-center justify-center gap-3">
        <button id="clear-completed-btn" class="text-sm text-red-500 hover:text-red-600 font-medium hover:underline">
          Clear Completed
        </button>
        <button id="clear-all-btn" class="text-sm text-gray-600 hover:text-red-600 font-medium hover:underline">
          Clear All
        </button>
      </div>
    </section>

    <!-- Chef Bot Modal -->
    <div id="chef-modal" class="fixed inset-0 z-40 hidden">
      <div id="chat-backdrop" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
      <div class="relative z-50 flex items-center justify-center min-h-screen px-4 py-8">
        <div class="bg-white w-full max-w-3xl rounded-2xl shadow-2xl flex flex-col max-h-[90vh]">

          <!-- Chat Header -->
          <div class="h-16 border-b border-gray-100 flex items-center justify-between px-4 bg-white rounded-t-2xl">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center">
                <svg class="w-5 h-5 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
              </div>
              <div>
                <h2 class="font-bold text-gray-900">Chef Bot</h2>
                <p class="text-xs text-green-500 font-medium flex items-center gap-1">
                  <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> Online
                </p>
              </div>
            </div>
            <div class="flex items-center gap-1">
              <button id="clear-chat-btn" class="btn-icon flex items-center gap-1" title="Clear History">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                <span class="text-sm font-semibold text-gray-600">Clear Chat</span>
              </button>
              <button id="chat-close-btn" class="btn-icon">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
          </div>

          <!-- Chat Messages -->
          <div id="chat-container" class="flex-grow overflow-y-auto p-4 bg-gray-50">
            <div id="chat-messages" class="flex flex-col">
               <!-- Messages injected here -->
            </div>
          </div>

          <!-- Shortcut Action -->
          <div class="px-4 py-2 bg-gray-50">
            <button id="analyze-btn" class="w-full bg-white border border-orange-200 text-orange-600 hover:bg-orange-50 text-sm font-semibold py-2 rounded-lg transition-colors shadow-sm">
              ✨ What can I cook with my list?
            </button>
          </div>

          <!-- Input -->
          <div class="p-4 bg-white border-t border-gray-200 rounded-b-2xl">
            <form id="chat-form" class="flex gap-2">
              <input type="text" id="chat-input" class="flex-grow bg-gray-100 border-none rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-orange-500 focus:bg-white transition-colors" placeholder="Waiting for AI..." disabled>
              <button type="submit" id="send-btn" class="bg-orange-500 hover:bg-orange-600 text-white p-2 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
       <h2 class="text-xl font-bold text-gray-900 mb-2">Waking up Chef Bot</h2>
       <p class="text-gray-500 text-sm mb-4">This happens locally in your browser...</p>
       
       <div class="w-64 h-2 bg-gray-200 rounded-full overflow-hidden">
         <div id="ai-progress-bar" class="h-full bg-orange-500 transition-all duration-300" style="width: 0%"></div>
       </div>
       <p id="ai-status-text" class="text-xs text-gray-400 mt-2">Initializing...</p>
    </div>
  </main>

  <!-- Share Modal -->
  <div id="share-modal" class="fixed inset-0 z-40 hidden">
    <div id="share-backdrop" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative z-50 flex items-center justify-center min-h-screen px-4 py-8">
      <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-6">
        <div class="flex items-center justify-between mb-4">
          <div>
            <h2 class="text-lg font-bold text-gray-900">Share your list</h2>
            <p class="text-sm text-gray-500">Send your unpurchased items to an email.</p>
          </div>
          <button id="share-close-btn" class="btn-icon" aria-label="Close share modal">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <form id="share-form" class="space-y-4">
          <div>
            <label for="share-email-input" class="block text-sm font-semibold text-gray-700 mb-1">Email address</label>
            <input type="email" id="share-email-input" required class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none" placeholder="you@example.com">
          </div>
          <div class="flex items-center justify-end gap-2">
            <button type="button" id="share-cancel-btn" class="px-3 py-2 text-sm font-semibold text-gray-600 hover:text-gray-900">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white text-sm font-semibold rounded-lg transition-colors">Send</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="scripts/helpers.js"></script>
  <script src="scripts/ai.js"></script>
  <script src="scripts/ui.js"></script>
  <script src="scripts/main.js"></script>

</body>
</html>
