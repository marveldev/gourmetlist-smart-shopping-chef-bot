<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>GourmetList - App</title>
		
		<!-- PWA Meta Tags -->
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#8c3f6d" />
		<link rel="apple-touch-icon" href="/logo.svg" />

		<script src="https://cdn.jsdelivr.net/npm/tailwindcss-cdn@3.4.10/tailwindcss.js"></script>
		<link rel="stylesheet" href="styles/main.css" />
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
			rel="stylesheet" />

		<style type="text/tailwindcss" data-teda="tailwind-apply">
			@layer components {
				.btn-icon {
					@apply p-2 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors focus:outline-none focus:ring-2 focus:ring-orange-200;
				}
			}
		</style>
	</head>
	<body class="bg-[#f4f7f5] h-screen overflow-hidden flex flex-col">
		<!-- Header -->
		<header class="bg-white border-b border-gray-200 h-16 flex-shrink-0 z-20">
			<div class="h-full px-4 md:px-6 flex items-center justify-between">
				<a href="index.html" class="flex items-center gap-2 group">
					<div
						class="text-[#8c3f6d] w-6 h-6 group-hover:scale-110 transition-transform">
						<svg
							xmlns="http://www.w3.org/2000/svg"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round">
							<path
								d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
						</svg>
					</div>
					<span
						class="font-bold text-gray-900 group-hover:text-orange-600 transition-colors"
						>GourmetList</span
					>
				</a>
				<div class="flex items-center gap-2">
					<button id="chat-toggle-btn" class="lg:hidden btn-icon relative">
						<svg
							class="w-6 h-6"
							fill="none"
							stroke="currentColor"
							viewBox="0 0 24 24">
							<path
								stroke-linecap="round"
								stroke-linejoin="round"
								stroke-width="2"
								d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
						</svg>
						<!-- Badge -->
						<span
							class="absolute top-1.5 right-1.5 w-2 h-2 bg-orange-500 rounded-full"></span>
					</button>
					<button id="share-header-btn" class="btn-icon" title="Share list">
						<svg
							class="w-6 h-6"
							fill="none"
							stroke="currentColor"
							viewBox="0 0 24 24">
							<path
								stroke-linecap="round"
								stroke-linejoin="round"
								stroke-width="2"
								d="M4 12v.01M12 4v.01M20 12v.01M12 20v.01M7.75 7.75l8.5 8.5M7.75 16.25l8.5-8.5" />
						</svg>
					</button>
					<button
						id="theme-toggle-btn"
						class="btn-icon"
						title="Switch to dark theme"
						aria-label="Switch to dark theme">
						<svg
							class="w-6 h-6"
							fill="none"
							stroke="currentColor"
							viewBox="0 0 24 24">
							<path
								stroke-linecap="round"
								stroke-linejoin="round"
								stroke-width="2"
								d="M20 12.41A8 8 0 0111.59 4 7 7 0 1012 20a8 8 0 008-7.59z" />
						</svg>
					</button>
				</div>
			</div>
		</header>

		<!-- Main Content -->
		<main class="flex-grow flex overflow-hidden relative">
			<!-- Shopping List Panel -->
			<section
				class="flex-grow flex flex-col w-full h-full overflow-hidden bg-[#f4f7f5]">
				<!-- Input Area -->
				<div class="p-6 max-w-3xl mx-auto w-full">
					<form id="add-form" class="relative">
						<input
							type="text"
							id="item-input"
							placeholder="Add item (e.g. 'Milk', 'Eggs')"
							class="w-full pl-5 pr-14 py-4 rounded-2xl border-none shadow-lg focus:ring-2 focus:ring-orange-500 outline-none text-lg text-gray-800 placeholder-gray-400" />
						<button
							type="submit"
							class="absolute right-2 top-2 bottom-2 bg-orange-500 hover:bg-orange-600 text-white rounded-xl px-4 transition-colors">
							<svg
								class="w-6 h-6"
								fill="none"
								stroke="currentColor"
								viewBox="0 0 24 24">
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									stroke-width="2"
									d="M12 4v16m8-8H4" />
							</svg>
						</button>
					</form>
				</div>

				<div
					class="px-6 pb-2 max-w-3xl mx-auto w-full flex items-center justify-between">
					<div class="flex gap-2">
						<button
							class="filter-btn bg-orange-500 text-white px-3 py-1 rounded-lg text-sm font-medium transition-colors"
							data-filter="all">
							All
						</button>
						<button
							class="filter-btn text-gray-600 hover:bg-gray-200 px-3 py-1 rounded-lg text-sm font-medium transition-colors"
							data-filter="active">
							To Buy
						</button>
						<button
							class="filter-btn text-gray-600 hover:bg-gray-200 px-3 py-1 rounded-lg text-sm font-medium transition-colors"
							data-filter="completed">
							Done
						</button>
						<button
							class="filter-btn text-gray-600 hover:bg-gray-200 px-3 py-1 rounded-lg text-sm font-medium transition-colors"
							data-filter="shared">
							Shared
						</button>
					</div>
					<div class="flex items-center gap-3 flex-wrap">
						<div class="flex flex-col items-start gap-2 w-24">
							<!-- Button -->
							<button
								id="open-chef-btn"
								disabled
								class="w-full text-xs font-semibold text-white bg-orange-400 px-3 py-1 rounded-lg transition-colors flex items-center justify-center gap-1 opacity-50 cursor-not-allowed">
								<svg
									class="w-4 h-4"
									fill="none"
									stroke="currentColor"
									viewBox="0 0 24 24">
									<path
										stroke-linecap="round"
										stroke-linejoin="round"
										stroke-width="2"
										d="M12 11c1.657 0 3-1.12 3-2.5S13.657 6 12 6s-3 1.12-3 2.5S10.343 11 12 11z" />
									<path
										stroke-linecap="round"
										stroke-linejoin="round"
										stroke-width="2"
										d="M6 20v-1a6 6 0 0112 0v1" />
								</svg>
								Chef Bot
							</button>

							<!-- Progress Bar + Status -->
							<div class="flex flex-col w-full gap-1 text-xs">
								<div
									class="w-full h-1 bg-gray-200 rounded-full overflow-hidden">
									<div
										id="ai-progress-bar"
										class="h-full bg-orange-500 transition-all duration-300"
										style="width: 0%"></div>
								</div>
								<span id="ai-status-text" class="text-gray-500 text-center"
									>Loading Chef Bot... 0%</span
								>
							</div>
						</div>

						<button
							id="smart-sort-btn"
							class="text-xs font-semibold text-orange-600 bg-orange-50 hover:bg-orange-100 px-3 py-1 rounded-lg transition-colors">
							Smart Sort
						</button>
						<span
							id="stats-text"
							class="text-xs font-bold text-gray-400 uppercase tracking-wider"
							>0/0 done</span
						>
					</div>
				</div>
				<!-- Progress Bar -->
				<div class="w-full h-1 bg-gray-200">
					<div
						id="progress-bar"
						class="h-full bg-orange-500 transition-all duration-500"
						style="width: 0%"></div>
				</div>
				<!-- List Items -->
				<div
					id="shopping-list"
					class="flex-grow overflow-y-auto p-6 max-w-3xl mx-auto w-full space-y-2"></div>
				<div
					class="p-4 border-t border-gray-200 bg-[#f4f7f5] flex flex-wrap items-center justify-center gap-3">
					<button
						id="clear-completed-btn"
						class="text-sm text-red-500 hover:text-red-600 font-medium hover:underline">
						Clear Completed
					</button>
					<button
						id="clear-all-btn"
						class="text-sm text-gray-600 hover:text-red-600 font-medium hover:underline">
						Clear All
					</button>
				</div>
			</section>
		</main>

		<!-- Share Modal -->
		<div id="share-modal" class="fixed inset-0 z-40 hidden">
			<div
				id="share-backdrop"
				class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
			<div
				class="relative z-50 flex items-center justify-center min-h-screen px-4 py-8">
				<div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-6">
					<div class="flex items-center justify-between mb-4">
						<div>
							<h2 class="text-lg font-bold text-gray-900">Share your list</h2>
							<p class="text-sm text-gray-500">
								Send your unpurchased items to an email.
							</p>
						</div>
						<button
							id="share-close-btn"
							class="btn-icon"
							aria-label="Close share modal">
							<svg
								class="w-6 h-6"
								fill="none"
								stroke="currentColor"
								viewBox="0 0 24 24">
								<path
									stroke-linecap="round"
									stroke-linejoin="round"
									stroke-width="2"
									d="M6 18L18 6M6 6l12 12" />
							</svg>
						</button>
					</div>
					<form id="share-form" class="space-y-4">
						<div>
							<label
								for="share-email-input"
								class="block text-sm font-semibold text-gray-700 mb-1"
								>Email address</label
							>
							<input
								type="email"
								id="share-email-input"
								required
								class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none"
								placeholder="you@example.com" />
						</div>
						<div class="flex items-center justify-end gap-2">
							<button
								type="button"
								id="share-cancel-btn"
								class="px-3 py-2 text-sm font-semibold text-gray-600 hover:text-gray-900">
								Cancel
							</button>
							<button
								type="submit"
								class="px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white text-sm font-semibold rounded-lg transition-colors">
								Send
							</button>
						</div>
					</form>
				</div>
			</div>
		</div>
		<!-- Scripts -->
		<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
		<script src="scripts/helpers.js"></script>
		<script src="scripts/ai.js"></script>
		<script src="scripts/ui.js"></script>
		<script src="scripts/main.js"></script>
	</body>
</html>
